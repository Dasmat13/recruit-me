services:
  mongo:
    image: mongo:7
    container_name: recruitme-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: recruitme

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: recruitme-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017/recruitme
      PORT: 3001
      FRONTEND_ORIGIN: http://localhost:3000
    env_file:
      - ./server/.env

volumes:
  mongo_data:
